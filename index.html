<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Your Travel Edible | Mood</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
      background: transparent;
      overflow-x: hidden;
    }

    * { box-sizing: border-box; }

    .quiz-wrapper {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .quiz-card {
      background: #FFFFFF;
      border-radius: 20px;
      border: 1px solid #E8E8E8;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .progress-track {
      height: 3px;
      background: #F0F0F0;
      display: none;
    }

    .progress-track.active { display: block; }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2D4A3E, #4A7A68);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 3px;
    }

    .quiz-content {
      padding: 36px 32px;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .quiz-content.fade-out {
      opacity: 0;
      transform: translateY(12px);
    }

    .quiz-content.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    .intro { text-align: center; }
    .intro-icon { font-size: 44px; margin-bottom: 16px; }
    .intro h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 800; color: #1A1A1A;
      margin: 0 0 10px; line-height: 1.2; letter-spacing: -0.02em;
    }
    .intro p {
      color: #777; font-size: 14px; line-height: 1.6;
      margin: 0 auto 28px; max-width: 360px;
    }
    .btn-start {
      background: #2D4A3E; color: #FFF;
      border: none; border-radius: 12px; padding: 14px 44px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; letter-spacing: 0.02em; transition: all 0.2s ease;
    }
    .btn-start:hover { background: #3B5E4F; transform: scale(1.03); }

    .question-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .question-step { color: #999; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; }
    .question-icon { font-size: 22px; }
    .question-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700; color: #1A1A1A;
      margin: 0 0 22px; line-height: 1.3;
    }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option-btn {
      display: flex; align-items: center; gap: 12px;
      background: #FAFAFA; border: 1px solid #E8E8E8;
      border-radius: 12px; padding: 14px 18px; color: #333;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: inherit; text-align: left; transition: all 0.2s ease; width: 100%;
    }
    .option-btn:hover { background: #F0F7F4; border-color: #B8D4C8; }
    .option-btn.selected { background: #EBF5F0; border-color: #2D4A3E; transform: scale(0.98); }
    .option-emoji { font-size: 20px; flex-shrink: 0; }

    .result-header { text-align: center; margin-bottom: 22px; }
    .result-badge {
      display: inline-block; background: #EBF5F0; color: #2D4A3E;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; padding: 5px 14px; border-radius: 100px; margin-bottom: 14px;
    }
    .result-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 800; color: #1A1A1A; margin: 0 0 4px; line-height: 1.25;
    }
    .result-dose { color: #888; font-size: 13px; margin: 0; }
    .result-card { border-radius: 16px; padding: 22px; margin-bottom: 20px; }
    .result-tagline {
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 700; color: #FFF; margin: 0 0 10px; line-height: 1.3;
    }
    .result-why { color: rgba(255,255,255,0.9); font-size: 13px; line-height: 1.65; margin: 0; }
    .result-actions { display: flex; gap: 10px; }
    .btn-shop {
      flex: 1; display: block; text-align: center; background: #2D4A3E; color: #FFF;
      border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700;
      text-decoration: none; font-family: inherit; transition: all 0.2s ease;
    }
    .btn-shop:hover { background: #3B5E4F; transform: scale(1.03); }
    .btn-retake {
      background: #FAFAFA; border: 1px solid #E0E0E0;
      color: #777; border-radius: 12px; padding: 14px 22px;
      font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.2s ease;
    }
    .btn-retake:hover { color: #333; border-color: #CCC; }
    .footer-note { text-align: center; color: #BBB; font-size: 11px; margin-top: 16px; line-height: 1.5; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="quiz-wrapper">
    <div class="quiz-card">
      <div class="progress-track" id="progressTrack">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="quiz-content fade-in" id="quizContent">
        <div id="introScreen" class="intro">
          <div class="intro-icon">✈️</div>
          <h1>Find Your Travel Edible</h1>
          <p>Answer 4 quick questions and we'll match you with the perfect Mood gummy for your next trip.</p>
          <button class="btn-start" id="btnStart">Let's Go</button>
        </div>
        <div id="questionScreen" class="hidden"></div>
        <div id="resultScreen" class="hidden"></div>
      </div>
    </div>
    <p class="footer-note">All Mood products are hemp-derived, third-party lab tested, and ship in discreet packaging.</p>
  </div>

  <script>
    var QUESTIONS = [
      { id: "trip", question: "What kind of trip are you taking?", icon: "✈️", options: [
        { label: "Business / Work", value: "business", icon: "💼" },
        { label: "Vacation / Leisure", value: "vacation", icon: "🏖️" },
        { label: "Long-Haul / Red-Eye", value: "longhaul", icon: "🌙" },
        { label: "Weekend Getaway", value: "weekend", icon: "🚗" }
      ]},
      { id: "timing", question: "How quickly do you want effects to kick in?", icon: "⏱️", options: [
        { label: "Fast — 15–20 min", value: "fast", icon: "⚡" },
        { label: "Standard — 45–90 min", value: "standard", icon: "⏳" },
        { label: "No preference", value: "any", icon: "🤷" }
      ]},
      { id: "experience", question: "What's your experience level with edibles?", icon: "🌱", options: [
        { label: "New to edibles", value: "beginner", icon: "🌱" },
        { label: "Occasional user", value: "moderate", icon: "🌿" },
        { label: "Experienced", value: "experienced", icon: "🌳" }
      ]},
      { id: "goal", question: "What's the main goal for your trip?", icon: "🎯", options: [
        { label: "Stay sharp & relaxed", value: "sharp", icon: "🧠" },
        { label: "Full-body unwind", value: "unwind", icon: "🛋️" },
        { label: "Help with sleep / jet lag", value: "sleep", icon: "😴" },
        { label: "Quick relief on arrival", value: "quick", icon: "🏃" }
      ]}
    ];

    var RESULTS = {
      microdose: { name: "Micro-Dose Delta-9 THC Gummies", dose: "5mg per gummy", tagline: "Low-key calm without the fog", why: "Perfect for business settings where you need to stay sharp. Subtle enough to keep you composed through meetings and networking, with discreet pharmacy-style packaging that blends right into your laptop bag.", url: "https://mood.com/product/micro-dose-delta-9-thc-gummies", gradient: "linear-gradient(135deg, #2D4A3E 0%, #3B5E4F 100%)" },
      standard: { name: "15mg Delta-9 THC Gummies", dose: "15mg per gummy", tagline: "Mood's #1 bestseller for a reason", why: "Trusted by 900,000+ customers, these deliver full-body relaxation ideal for vacation mode. Heat-sealed packaging stays fresh throughout your trip, and they look just like regular vitamins in your carry-on.", url: "https://mood.com/product/15mg-delta-9-thc-gummies", gradient: "linear-gradient(135deg, #2D4A3E 0%, #4A7A68 100%)" },
      sleepytime: { name: "Sleepytime Delta-9 THC Gummies", dose: "Rest-focused formula", tagline: "Reset your clock, wherever you land", why: "Designed specifically for sleep support when your internal clock is off. A smart addition to any long-haul traveler's carry-on for beating jet lag and transitioning into rest mode after red-eye flights.", url: "https://mood.com/product/sleepytime-delta-9-thc-gummies", gradient: "linear-gradient(135deg, #3B3455 0%, #5B4F82 100%)" },
      rapid: { name: "Rapid Onset Delta-9 THC Gummies", dose: "Fast-acting formula", tagline: "From landing to unwinding in 15 minutes", why: "Nano-emulsion technology means effects hit in roughly 15–20 minutes instead of 45–90. Ideal when travel delays eat into your relaxation time and you want to unwind fast after touchdown.", url: "https://mood.com/product/rapid-onset-delta-9-thc-gummies", gradient: "linear-gradient(135deg, #8B6914 0%, #B8860B 100%)" }
    };

    var currentStep = -1;
    var answers = {};
    var quizContent = document.getElementById("quizContent");
    var introScreen = document.getElementById("introScreen");
    var questionScreen = document.getElementById("questionScreen");
    var resultScreen = document.getElementById("resultScreen");
    var progressTrack = document.getElementById("progressTrack");
    var progressBar = document.getElementById("progressBar");

    function sendHeight() {
      var h = document.documentElement.scrollHeight;
      window.parent.postMessage({ type: "quiz-resize", height: h }, "*");
    }

    document.getElementById("btnStart").addEventListener("click", function() {
      currentStep = 0; answers = {};
      transitionTo(showQuestion);
    });

    function transitionTo(cb) {
      quizContent.classList.remove("fade-in");
      quizContent.classList.add("fade-out");
      setTimeout(function() {
        cb();
        quizContent.classList.remove("fade-out");
        quizContent.classList.add("fade-in");
        setTimeout(sendHeight, 100);
      }, 300);
    }

    function showQuestion() {
      var q = QUESTIONS[currentStep];
      introScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      questionScreen.classList.remove("hidden");
      progressTrack.classList.add("active");
      progressBar.style.width = ((currentStep + 1) / QUESTIONS.length * 100) + "%";
      var html = '<div class="question-header"><span class="question-step">Question ' + (currentStep + 1) + ' of ' + QUESTIONS.length + '</span><span class="question-icon">' + q.icon + '</span></div><h2 class="question-text">' + q.question + '</h2><div class="options">';
      for (var i = 0; i < q.options.length; i++) {
        var o = q.options[i];
        html += '<button class="option-btn" data-qid="' + q.id + '" data-value="' + o.value + '"><span class="option-emoji">' + o.icon + '</span><span>' + o.label + '</span></button>';
      }
      html += '</div>';
      questionScreen.innerHTML = html;
      questionScreen.querySelectorAll(".option-btn").forEach(function(btn) { btn.addEventListener("click", handleOptionClick); });
    }

    function handleOptionClick(e) {
      var btn = e.currentTarget;
      btn.classList.add("selected");
      answers[btn.dataset.qid] = btn.dataset.value;
      questionScreen.querySelectorAll(".option-btn").forEach(function(b) { b.style.pointerEvents = "none"; });
      setTimeout(function() {
        if (currentStep < QUESTIONS.length - 1) { currentStep++; transitionTo(showQuestion); }
        else { transitionTo(function() { showResult(RESULTS[getResult(answers)]); }); }
      }, 400);
    }

    function getResult(a) {
      if (a.goal === "sleep" || a.trip === "longhaul") return "sleepytime";
      if (a.goal === "quick" || a.timing === "fast") return "rapid";
      if (a.trip === "business" || a.goal === "sharp" || a.experience === "beginner") return "microdose";
      return "standard";
    }

    function showResult(r) {
      questionScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      progressTrack.classList.remove("active");
      resultScreen.innerHTML = '<div class="result-header"><div class="result-badge">Your Match</div><h2 class="result-name">' + r.name + '</h2><p class="result-dose">' + r.dose + '</p></div><div class="result-card" style="background:' + r.gradient + '"><p class="result-tagline">' + r.tagline + '</p><p class="result-why">' + r.why + '</p></div><div class="result-actions"><a href="' + r.url + '" target="_blank" rel="noopener noreferrer" class="btn-shop">Shop Now</a><button class="btn-retake" id="btnRetake">Retake</button></div>';
      document.getElementById("btnRetake").addEventListener("click", function() {
        currentStep = -1; answers = {};
        transitionTo(function() {
          questionScreen.classList.add("hidden"); resultScreen.classList.add("hidden");
          introScreen.classList.remove("hidden"); progressTrack.classList.remove("active");
        });
      });
    }

    window.addEventListener("load", sendHeight);
  </script>
</body>
</html>
